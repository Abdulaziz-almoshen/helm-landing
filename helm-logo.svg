<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F76808"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background — deep black with rounded corners -->
  <rect width="512" height="512" rx="118" fill="#0C0C0E"/>
  <!-- Three input dots — scattered knowledge -->
  <circle cx="148" cy="128" r="22" fill="url(#g)" opacity=".3"/>
  <circle cx="296" cy="92" r="16" fill="url(#g)" opacity=".22"/>
  <circle cx="390" cy="156" r="14" fill="url(#g)" opacity=".28"/>
  <!-- Bold checkmark — structured action output -->
  <path d="M148 308 L232 400 L396 210" stroke="url(#g)" stroke-width="58" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
</svg>
